[package]
name = "heritage-gui"
version = "0.1.0-alpha"
description = "The Heritage wallet GUI, a Bitcoin Taproot wallet managing on-chain inheritance of bitcoins"
repository = "https://github.com/crypto7world/heritage-gui.git"
rust-version = "1.79"
edition = "2021"
authors = ["Crypto7 <john@crypto7.world>"]
license = "MIT"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
btc-heritage-wallet = { git = "https://github.com/crypto7world/btc-heritage.git", tag = "v0.20.1" }
open = "5.2.0"
dioxus = { version = "0.5", features = ["router", "desktop"] }

# Debug
dioxus-logger = "0.5.1"

# Command line
clap = { version = "4.5", features = ["derive", "env"] }
dirs-next = "2.0"

[dev-dependencies]
tempfile = "3"
